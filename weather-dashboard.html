<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2a5f8f;
            --primary-dark: #1a3a5c;
            --secondary: #f39c12;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --lighter: #f8f9fa;
            --dark: #2c3e50;
            --text: #34495e;
            --border: #bdc3c7;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease;
        }

        .search-box {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .search-box input::placeholder {
            color: #95a5a6;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--secondary);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .btn-secondary:hover {
            background: var(--lighter);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* CURRENT WEATHER */
        .current-weather {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.8s ease;
        }

        .current-weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .location-info h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--dark);
        }

        .location-info p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .weather-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 30px;
        }

        .weather-icon {
            text-align: center;
        }

        .weather-icon img {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        .weather-description {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .temperature {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .description {
            font-size: 1.3rem;
            color: var(--text);
            text-transform: capitalize;
        }

        .feels-like {
            font-size: 1rem;
            color: #7f8c8d;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding-top: 30px;
            border-top: 2px solid var(--light);
        }

        .detail-item {
            padding: 15px;
            background: var(--lighter);
            border-radius: 8px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* FORECAST */
        .forecast-section {
            margin-top: 30px;
        }

        .forecast-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: white;
            animation: slideDown 0.8s ease;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        .forecast-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .forecast-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .forecast-date {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .forecast-icon {
            margin: 10px 0;
        }

        .forecast-icon img {
            width: 60px;
            height: 60px;
        }

        .forecast-temp {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 10px 0;
        }

        .forecast-desc {
            font-size: 0.85rem;
            color: var(--text);
            text-transform: capitalize;
        }

        .forecast-details {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-top: 10px;
        }

        /* ALERTS */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
        }

        .alert-error {
            background: #fadbd8;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
        }

        .alert-success {
            background: #d5f4e6;
            color: #27ae60;
            border-left: 4px solid #27ae60;
        }

        .alert-info {
            background: #d6eaf8;
            color: #2980b9;
            border-left: 4px solid #3498db;
        }

        .alert-icon {
            font-size: 1.2rem;
        }

        /* LOADING */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 40px;
            font-size: 1.1rem;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* EMPTY STATE */
        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-container {
                flex-direction: column;
            }

            .weather-main {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .current-weather {
                padding: 20px;
            }

            .temperature {
                font-size: 2.5rem;
            }

            .weather-icon img {
                width: 100px;
                height: 100px;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .current-weather-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information powered by OpenWeatherMap API</p>
        </header>

        <!-- ALERTS -->
        <div id="alertContainer"></div>

        <!-- SEARCH BAR -->
        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Search by city name..." 
                    autocomplete="off"
                >
                <button class="btn btn-primary" onclick="searchWeather()">
                    <span>🔍</span> Search
                </button>
            </div>
            <button class="btn btn-secondary" onclick="getLocationWeather()">
                📍 Use My Location
            </button>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeatherContainer"></div>

        <!-- FORECAST -->
        <div id="forecastContainer"></div>
    </div>

    <script>
        // OpenWeatherMap API Key (Free tier - replace with your own if needed)
        const API_KEY = '2d91adcd38bbe503d9ec59b94b85bcc7';
        const API_BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // DOM Elements
        const alertContainer = document.getElementById('alertContainer');
        const cityInput = document.getElementById('cityInput');
        const currentWeatherContainer = document.getElementById('currentWeatherContainer');
        const forecastContainer = document.getElementById('forecastContainer');

        // Show Alert
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            
            let icon = 'ℹ️';
            if (type === 'error') icon = '❌';
            if (type === 'success') icon = '✅';
            if (type === 'info') icon = 'ℹ️';

            alert.innerHTML = `
                <span class="alert-icon">${icon}</span>
                <span>${message}</span>
            `;
            
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Fetch Weather
        async function fetchWeather(lat, lon) {
            try {
                currentWeatherContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading weather data...
                    </div>
                `;

                const weatherResponse = await fetch(
                    `${API_BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );
                const forecastResponse = await fetch(
                    `${API_BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );

                if (!weatherResponse.ok || !forecastResponse.ok) {
                    throw new Error('Failed to fetch weather data');
                }

                const weatherData = await weatherResponse.json();
                const forecastData = await forecastResponse.json();

                displayCurrentWeather(weatherData);
                displayForecast(forecastData);
                showAlert(`Weather loaded for ${weatherData.name}`, 'success');
            } catch (error) {
                showAlert('Unable to fetch weather data. Please try again.', 'error');
                currentWeatherContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Error Loading Weather</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Display Current Weather
        function displayCurrentWeather(data) {
            const { name, sys, main, weather, wind, clouds, visibility } = data;
            const iconUrl = `https://openweathermap.org/img/wn/${weather[0].icon}@4x.png`;

            const html = `
                <div class="current-weather">
                    <div class="current-weather-header">
                        <div class="location-info">
                            <h2>${name}, ${sys.country}</h2>
                            <p>${new Date().toLocaleString('en-US', { 
                                weekday: 'long', 
                                year: 'numeric', 
                                month: 'long', 
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}</p>
                        </div>
                    </div>

                    <div class="weather-main">
                        <div class="weather-icon">
                            <img src="${iconUrl}" alt="${weather[0].description}">
                        </div>
                        <div class="weather-description">
                            <div class="temperature">${Math.round(main.temp)}°C</div>
                            <div class="description">${weather[0].description}</div>
                            <div class="feels-like">Feels like ${Math.round(main.feels_like)}°C</div>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${(wind.speed * 3.6).toFixed(1)} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cloudiness</div>
                            <div class="detail-value">${clouds.all}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${(visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">N/A</div>
                        </div>
                    </div>
                </div>
            `;

            currentWeatherContainer.innerHTML = html;
        }

        // Display Forecast
        function displayForecast(data) {
            const forecasts = {};

            data.list.forEach(forecast => {
                const date = new Date(forecast.dt * 1000).toLocaleDateString();
                if (!forecasts[date]) {
                    forecasts[date] = forecast;
                }
            });

            const forecastArray = Object.values(forecasts).slice(1, 6);

            const html = `
                <div class="forecast-section">
                    <h3>📅 5-Day Forecast</h3>
                    <div class="forecast-grid">
                        ${forecastArray.map(forecast => `
                            <div class="forecast-card">
                                <div class="forecast-date">
                                    ${new Date(forecast.dt * 1000).toLocaleDateString('en-US', { 
                                        month: 'short', 
                                        day: 'numeric'
                                    })}
                                </div>
                                <div class="forecast-icon">
                                    <img src="https://openweathermap.org/img/wn/${forecast.weather[0].icon}@2x.png" 
                                         alt="${forecast.weather[0].description}">
                                </div>
                                <div class="forecast-temp">
                                    ${Math.round(forecast.main.temp)}°C
                                </div>
                                <div class="forecast-desc">
                                    ${forecast.weather[0].description}
                                </div>
                                <div class="forecast-details">
                                    💧 ${forecast.main.humidity}% | 💨 ${(forecast.wind.speed * 3.6).toFixed(1)} km/h
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            forecastContainer.innerHTML = html;
        }

        // Search Weather by City
        function searchWeather() {
            const city = cityInput.value.trim();
            if (!city) {
                showAlert('Please enter a city name', 'error');
                return;
            }

            fetch(`${API_BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`)
                .then(response => {
                    if (!response.ok) throw new Error('City not found');
                    return response.json();
                })
                .then(data => {
                    fetchWeather(data.coord.lat, data.coord.lon);
                    cityInput.value = '';
                })
                .catch(error => {
                    showAlert('City not found. Please try again.', 'error');
                });
        }

        // Get Weather by User's Location
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showAlert('Geolocation is not supported by your browser', 'error');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    fetchWeather(latitude, longitude);
                    showAlert('📍 Location detected successfully', 'success');
                },
                (error) => {
                    showAlert('Unable to access your location. Please enable location services.', 'error');
                }
            );
        }

        // Enter key to search
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default weather on page load (London)
        window.addEventListener('load', () => {
            fetch(`${API_BASE_URL}/weather?q=London&appid=${API_KEY}&units=metric`)
                .then(response => response.json())
                .then(data => {
                    fetchWeather(data.coord.lat, data.coord.lon);
                });
        });
    </script>
</body>
</html>
